<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Soft Discipline</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<h1>Soft Discipline</h1>

<div id="login">

<h2>Kira</h2>

<input id="password" type="password" placeholder="Пароль">

<button onclick="login()">Войти</button>

</div>

<div id="main">

<div class="card">

<p id="todayDate"></p>
<p id="streak"></p>
<p id="points"></p>
<p id="waist"></p>

</div>

<div class="menu">

<button onclick="addWorkout()">Тренировка</button>
<button onclick="openCalendar()">Календарь</button>
<button onclick="openGlow()">Glow Up</button>
<button onclick="openDiary()">Дневник</button>
<button onclick="openInspo()">Inspo</button>

</div>

<div id="content"></div>

<h3>AI тренер</h3>
<p id="aiCoach"></p>

<h3>Прогресс талии</h3>
<canvas id="chart"></canvas>

</div>

</div>

<script src="app.js"></script>
<script src="calendar.js"></script>
<script src="ai.js"></script>
<script src="inspo.js"></script>

</body>

</html>
